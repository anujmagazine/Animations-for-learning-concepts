<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI&Beyond — Business Model Canvas</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f0;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-border-tertiary: rgba(0,0,0,0.15);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-info: #378ADD;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1a1a1a;
      --color-background-secondary: #2c2c2a;
      --color-text-primary: #e8e6e0;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-border-tertiary: rgba(255,255,255,0.15);
      --color-border-secondary: rgba(255,255,255,0.3);
      --color-border-info: #85B7EB;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-sans); background: var(--color-background-secondary); padding: 20px; color: var(--color-text-primary); }
  #app { max-width: 900px; margin: 0 auto; }
  .hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .hdr h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .hdr span { font-size: 12px; color: var(--color-text-tertiary); }
  .canvas { display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); grid-auto-rows: auto; gap: 5px; }
  .cell { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 10px 9px; cursor: pointer; transition: border-color 0.2s; }
  .cell:hover { border-color: var(--color-border-secondary); }
  .cell.on { border: 1.5px solid var(--color-border-info); }
  .lbl { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
  .dt { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .items { font-size: 11.5px; color: var(--color-text-secondary); line-height: 1.55; }
  .items div { padding: 1.5px 0; }
  .kp { grid-column: 1/3; grid-row: 1/3; }
  .ka { grid-column: 3/5; grid-row: 1/2; }
  .kr { grid-column: 3/5; grid-row: 2/3; }
  .vp { grid-column: 5/7; grid-row: 1/3; }
  .cr { grid-column: 7/9; grid-row: 1/2; }
  .ch { grid-column: 7/9; grid-row: 2/3; }
  .cs { grid-column: 9/11; grid-row: 1/3; }
  .cost { grid-column: 1/6; grid-row: 3/4; }
  .rev { grid-column: 6/11; grid-row: 3/4; }
  .dp { margin-top: 10px; background: var(--color-background-secondary); border-radius: 12px; padding: 16px 18px; border: 0.5px solid var(--color-border-tertiary); }
  .dp-title { font-size: 15px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-primary); }
  .dp-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; }
  .dp-body p { margin-bottom: 8px; }
  .tg { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; margin: 1px 2px; }
  .tg-p { background: #EEEDFE; color: #3C3489; }
  .tg-t { background: #E1F5EE; color: #085041; }
  .tg-c { background: #FAECE7; color: #712B13; }
  .tg-b { background: #E6F1FB; color: #0C447C; }
  .tg-a { background: #FAEEDA; color: #633806; }
  .tg-g { background: #EAF3DE; color: #27500A; }
  .tg-pk { background: #FBEAF0; color: #72243E; }
  @media (prefers-color-scheme: dark) {
    .tg-p { background: #26215C; color: #CECBF6; }
    .tg-t { background: #04342C; color: #9FE1CB; }
    .tg-c { background: #4A1B0C; color: #F5C4B3; }
    .tg-b { background: #042C53; color: #B5D4F4; }
    .tg-a { background: #412402; color: #FAC775; }
    .tg-g { background: #173404; color: #C0DD97; }
    .tg-pk { background: #4B1528; color: #F4C0D1; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
var DATA = {
  kp: { color: '#534AB7', label: 'Key partners', items: ['Ashoka University','IndiaAI Mission / MeitY','Inflexion (advisory arm)','Coursera, FutureSkills Prime','Enterprise HR / L&D teams'],
    detail: '<p><span class="tg tg-p">Ashoka University</span> Co-delivers executive programmes for senior leaders, lending academic credibility and access to Ashoka\'s corporate network.</p><p><span class="tg tg-p">IndiaAI Mission / MeitY</span> AI&Beyond co-created the YUVA AI for All course — now on Coursera, FutureSkills Prime, iGOT Karmayogi — targeting 10 million citizens with foundational AI literacy.</p><p><span class="tg tg-p">Inflexion</span> Jaspreet Bindra\'s advisory firm feeds strategic context and CXO relationships into the pipeline.</p><p><span class="tg tg-p">Enterprise L&D / HR</span> Internal champions at client companies act as buyers and distribution partners — they customise the brief, secure budget, and drive attendance.</p>' },
  ka: { color: '#0F6E56', label: 'Key activities', items: ['Custom bootcamp design','Keynotes & briefings','AI Literacy-as-a-Service','Consulting & advisory','Content & book publishing'],
    detail: '<p><span class="tg tg-t">Custom bootcamp design</span> Every bootcamp is built around the client\'s actual workflows, industry challenges, and function-level context. Pre-bootcamp questionnaires and deep-dive conversations tailor scenarios to the room.</p><p><span class="tg tg-t">Keynotes & executive briefings</span> Board-level sessions on AI\'s strategic implications.</p><p><span class="tg tg-t">AI Literacy-as-a-Service</span> 6–12 month retainers with monthly office hours, prompt clinics, and workflow redesign support — building habits, not just awareness.</p><p><span class="tg tg-t">Content & publishing</span> The book "Winning with AI", the AI Unlocked newsletter, LinkedIn posts, and the YUVA AI course all serve as awareness engines.</p>' },
  kr: { color: '#993C1D', label: 'Key resources', items: ['Founder expertise & brand','Proprietary frameworks','Scenario design IP','Client workflow knowledge','Book: Winning with AI'],
    detail: '<p><span class="tg tg-c">Founder expertise</span> Jaspreet (ex-Microsoft, Mahindra CDO) and Anuj (AI & cybersecurity) bring decades of enterprise credibility. Archana Muthappa (COO) adds operational scaling expertise.</p><p><span class="tg tg-c">Proprietary frameworks</span> The READS/WRITES/ADDS/THINKS/DOES AI literacy model, the "10X Employee" positioning, and the "First Law of AI Literacy".</p><p><span class="tg tg-c">Scenario design IP</span> A growing library of industry-specific AI scenarios (legal, aviation, real estate, insurance, financial services) rapidly adapted for new clients.</p><p><span class="tg tg-c">Book: Winning with AI</span> First book on AI with its own AI chatbot — serves as both a product and a lead generation asset.</p>' },
  vp: { color: '#185FA5', label: 'Value propositions', items: ['AI literacy as 4th pillar','Workflow-first, not tool-first','Industry-customised bootcamps','Experiential, not theoretical','Boardroom to frontline reach','Ethics & responsibility baked in'],
    detail: '<p><span class="tg tg-b">AI literacy as the 4th pillar</span> Core thesis: AI literacy sits alongside reading, writing, and arithmetic. Not everyone needs to be an AI expert, but everyone must be AI literate.</p><p><span class="tg tg-b">Workflow-first</span> Focus on end-to-end workflow transformation rather than isolated productivity hacks. Mental models that outlast any single platform.</p><p><span class="tg tg-b">Industry-customised</span> Finance teams ≠ legal teams ≠ HR teams. Each bootcamp uses real client challenges, real workflows, and real data contexts.</p><p><span class="tg tg-b">Experiential learning</span> Participants use AI on their actual work problems during the session — building confidence through doing.</p><p><span class="tg tg-b">Boardroom to frontline</span> One of the few firms that serves both the CEO\'s strategic questions and the operations manager\'s daily workflow.</p>' },
  cr: { color: '#993556', label: 'Customer relationships', items: ['High-touch, founder-led','Pre-bootcamp questionnaires','Monthly office hours (LaaS)','Post-event feedback loops'],
    detail: '<p><span class="tg tg-pk">High-touch, founder-led</span> Jaspreet and Anuj personally facilitate most sessions — premium delivery, with Archana now addressing the scaling constraint.</p><p><span class="tg tg-pk">4-step engagement</span> Exploration conversations → questionnaire deep-dives → content customisation → delivery with follow-up.</p><p><span class="tg tg-pk">LaaS retainers</span> 6–12 month engagements with monthly touchpoints move the relationship from transactional to embedded partner.</p><p><span class="tg tg-pk">Feedback loops</span> Post-bootcamp surveys drive iteration, upsell signals, and case study material for future sales.</p>' },
  ch: { color: '#854F0B', label: 'Channels', items: ['Direct enterprise sales','LinkedIn thought leadership','AI Unlocked newsletter','Book + AI chatbot companion','YUVA AI / Coursera (awareness)'],
    detail: '<p><span class="tg tg-a">Direct enterprise sales</span> Relationship-driven outreach to CXOs, HR heads, and L&D leaders across Indian enterprises.</p><p><span class="tg tg-a">LinkedIn & newsletter</span> Consistent thought leadership via LinkedIn posts and the weekly "AI Unlocked" newsletter build top-of-funnel awareness.</p><p><span class="tg tg-a">YUVA AI / Coursera</span> The government course creates massive awareness at zero acquisition cost — enterprise leaders encountering it may seek deeper engagement.</p><p><span class="tg tg-a">Book as a channel</span> "Winning with AI" with its companion AI chatbot serves as a tangible credibility asset that opens enterprise doors.</p>' },
  cs: { color: '#639922', label: 'Customer segments', items: ['Enterprise C-suite & boards','Mid-management teams','Function heads (legal, finance, HR)','Govt & defence','India + Middle East + SEA'],
    detail: '<p><span class="tg tg-g">Enterprise C-suite & boards</span> Strategic briefings and executive programmes for decision-makers who need to understand AI\'s business implications.</p><p><span class="tg tg-g">Mid-management & function heads</span> The bulk of bootcamp attendees — legal, finance, HR, operations, marketing leaders integrating AI into team workflows.</p><p><span class="tg tg-g">Industry spread</span> 45+ enterprises across airlines (IndiGo), financial services (Capri Global, Sun Life), legal (JSA Law), real estate (Ajmera), chemicals (DCW), sports (OGQ), logistics (Crown Worldwide), advertising (ASCI), insurance (Shriram Life), and professional services (KPMG).</p><p><span class="tg tg-g">Geography</span> India is the core market, extending to Middle East and Southeast Asia.</p>' },
  cost: { color: '#A32D2D', label: 'Cost structure', items: ['Founder time & travel','AI tool subscriptions','Content & curriculum development','Research & scenario updates','Ops, BD & marketing team'],
    detail: '<p>The business is <b>people-intensive and IP-heavy</b>, with low fixed infrastructure costs:</p><p><span class="tg tg-c">Founder time</span> The single largest cost — preparation, customisation, delivery, and business development.</p><p><span class="tg tg-c">Travel & logistics</span> On-site delivery across India and international markets.</p><p><span class="tg tg-c">AI tool subscriptions</span> Claude, ChatGPT, and other AI tools used for content production and as teaching aids.</p><p><span class="tg tg-c">Content development</span> Continuous research, scenario design, simulation building, and material updates.</p><p><span class="tg tg-c">Operations team</span> BD, marketing, and admin support (team of 0–50).</p>' },
  rev: { color: '#3B6D11', label: 'Revenue streams', items: ['Bootcamp fees (per-session)','AI Literacy-as-a-Service (retainer)','Keynote & speaking fees','Executive briefings','Consulting & advisory','Book royalties'],
    detail: '<p><span class="tg tg-g">Bootcamp fees</span> Per-session pricing for customised AI literacy bootcamps — the current primary revenue driver.</p><p><span class="tg tg-g">AI Literacy-as-a-Service</span> 6–12 month retainer model — the strategic growth lever for predictable recurring revenue.</p><p><span class="tg tg-g">Keynote fees</span> Paid keynotes at corporate events, industry conferences, and leadership offsites.</p><p><span class="tg tg-g">Executive briefings</span> Premium board-level sessions, sometimes in partnership with Ashoka University.</p><p><span class="tg tg-g">Consulting</span> Strategic AI adoption consulting for enterprises building their own AI strategies.</p><p><span class="tg tg-g">Book royalties</span> "Winning with AI" generates revenue alongside its lead-gen value.</p><p style="margin-top:8px;font-style:italic;color:var(--color-text-tertiary)">Revenue model is transitioning from one-off bootcamp sales toward recurring LaaS retainers.</p>' }
};

var active = null;

function render() {
  var keys = ['kp','ka','kr','vp','cr','ch','cs','cost','rev'];
  var html = '<div class="hdr"><h2>AI&Beyond — business model canvas</h2><span>Tap any block for details</span></div><div class="canvas">';
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var d = DATA[k];
    var cls = active === k ? ' on' : '';
    html += '<div class="cell ' + k + cls + '" id="c-' + k + '" data-key="' + k + '">';
    html += '<div class="lbl"><div class="dt" style="background:' + d.color + '"></div><span style="color:' + d.color + '">' + d.label + '</span></div>';
    html += '<div class="items">';
    for (var j = 0; j < d.items.length; j++) {
      html += '<div>' + d.items[j] + '</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  if (active && DATA[active]) {
    html += '<div class="dp"><div class="dp-title">' + DATA[active].label + '</div><div class="dp-body">' + DATA[active].detail + '</div></div>';
  }
  document.getElementById('app').innerHTML = html;
  var cells = document.querySelectorAll('.cell');
  for (var c = 0; c < cells.length; c++) {
    cells[c].addEventListener('click', handleClick);
  }
}

function handleClick(e) {
  var el = e.currentTarget;
  var key = el.getAttribute('data-key');
  if (active === key) {
    active = null;
  } else {
    active = key;
  }
  render();
}

render();
</script>
</body>
</html>
